    <!----------------------------- CSS ----------------------------->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    <!----------------------------- SCRIPTS ----------------------------->
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/date.js" defer></script>
    <script src="scripts/weather.js" defer></script>
    <script src="scripts/spotlight.js" defer></script>
</head>
<body>
    <header>
        <img src="images/logo.svg" alt="Site Logo" width="512" height="512">
        <span>General Rodriguez Chamber of Commerce</span>
        <button id="ham-button" class="hamburger" aria-label="Open menu"></button>
    </header>
    <nav id="nav-bar" class="navigation">
        <ul>
            <li><a class="current" href="index.html">Home</a></li>
            <li><a href="#">Discover</a></li>
            <li><a href="directory.html">Directory</a></li>
            <li><a href="#">Join</a></li>
        </ul>
    </nav>
    <main>
        <!-- HERO SECTION -->
        <section class="hero">
            <img src="images/general-rodriguez.webp" alt="General Rodriguez City">
            <div class="hero-content">
                <h1>Welcome to the General Rodriguez Chamber of Commerce</h1>
                <a href="#">Join to the Chamber</a>
            </div>
        </section>
        <section class="events-weather-container">
            <!-- EVENTS SECTION -->
            <section class="events">
                <h2>Upcoming Events</h2>
                <ul>
                    <li>Business meeting: Friday 7:00 PM</li>
                    <li>Local Fair: Sunday 10:00 AM</li>
                </ul>
            </section>
            <!-- WEATHER SECTION -->
            <section class="weather">
                <h2>Current Weather</h2>
                <div class="current-weather">
                    <figure>
                        <img id="weather-icon">
                        <figcaption id="caption-desc"></figcaption>
                    </figure>
                    <p id="current-temp"></p>
                </div>
                <h3>Weather Forecast</h3>
                <div class="forecast">
                    <p id="day-1"></p>
                    <p id="day-2"></p>
                    <p id="day-3"></p>
                </div>
            </section>
        </section>
        <section id="spotlights" class="cards grid">
        </section>
    </main>
    <footer>
        <div class="social">
            <a href="https://www.facebook.com/ElTomiiXD/" target="_blank"><img src="images/facebook.svg" alt="Facebook Logo" width="16" height="16"></a>
            <a href="https://api.whatsapp.com/send/?phone=%2B541137663738&text&type=phone_number&app_absent=0" target="_blank"><img src="images/whatsapp.svg" alt="WhatsApp Logo" width="16" height="16"></a>
            <a href="https://www.instagram.com/tomii_gomez_/?__pwa=1" target="_blank"><img src="images/instagram.svg" alt="Instagram Logo" width="16" height="16"></a>
        </div>

        <p id="lastModified"></p>
    </footer>
