<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover our Chamber of Commerce, take a look at the benefits it offers, and we invite you to become a member.">
    <meta name="author" content="Thomas Gomez">
    <title>General Rodriguez - Chamber of Commerce Home Page</title>
    <link rel="icon" href="images/favicon.ico">
    <!----------------------------- FACEBOOK META TAGS ----------------------------->
    <meta property="og:title" content="Home page of the General Rodriguez Chamber of Commerce">
    <meta property="og:description" content="Discover our Chamber of Commerce, take a look at the benefits it offers, and we invite you to become a member.">
    <meta property="og:image" content="https://diegothomas2025.github.io/wdd231/images/profile.webp">
    <meta property="og:url" content="https://diegothomas2025.github.io/wdd231/chamber/directory.html">
    <!----------------------------- FONTS ----------------------------->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Pacifico&family=Roboto&display=swap" rel="stylesheet">
    <!----------------------------- CSS ----------------------------->
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    <!----------------------------- SCRIPTS ----------------------------->
    <script src="scripts/navigation.js" defer></script>
    <script src="scripts/date.js" defer></script>
    <script src="scripts/join.js" type="module"></script>
</head>
<body>
    <header>
        <img src="images/logo.svg" alt="Site Logo" width="512" height="512">
        <span>General Rodriguez Chamber of Commerce</span>
        <button id="ham-button" class="hamburger" aria-label="Open menu"></button>
    </header>
    <nav id="nav-bar" class="navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Discover</a></li>
            <li><a href="directory.html">Directory</a></li>
            <li><a class="current" href="join.html">Join</a></li>
        </ul>
    </nav>
    <main>
        <h1>Join</h1>
        <section class="join-grid">

            <form action="thankyou.html" method="get">
                <h2 class="form-title">Membership Aplication Form</h2>

                <label for="get-fname">First Name</label>
                <input type="text" required name="first" id="get-fname" title="Your First Name" autocomplete="given-name">

                <label for="get-lname">Last Name</label>
                <input type="text" required name="last" id="get-lname" title="Your Last Name" autocomplete="family-name">
                
                <label for="get-organization-title">Organization Title</label>
                <input type="text" name="organization-title" id="get-organization-title" title="Your Organization Title" autocomplete="organization-title">

                <label for="get-email">Email</label>
                <input type="email" required name="email" id="get-email" title="Your Email" autocomplete="email" placeholder="thomas4@gmail.com">

                <label for="get-phone">Phone Number</label>
                <input type="tel" required name="phone" title="Your Phone" id="get-phone" autocomplete="tel">
                <!-- BUSINESS NAME -->
                <label for="get-organization-name">Business Name</label>
                <input type="text" required name="organization-name" title="Your Business/Organization's Name" id="get-organization-name" autocomplete="organization">
                <!-- MEMBERSHIP LEVEL -->
                <label for="get-membership">Select Membership Level</label>
                <select name="membership-level" id="get-membership">
                    <option selected>none</option>
                    <option value="np">Non-Profit</option>
                    <option value="bronze">Bronze Memership</option>
                    <option value="silver">Silver Membership</option>
                    <option value="gold">Gold Membership</option>
                </select>
                <!-- ORGANIZATION NAME -->
                <label for="get-organization-description">Organization Description</label>
                <textarea name="organization-description" id="get-organization-description" title="Your Business/Organization's Description"></textarea>
                <!-- TIMESTAMP -->
                <input type="hidden" id="timestamp" name="timestamp">
                <!-- SUBMIT -->
                <input type="submit" name="submit" id="submit" value=" Join My Organization"> 
            </form>
            <!-- MEMBERSHIP SECTION -->
            <section>
                <h2 class="membership-h2">Membership Levels</h2>
                <div id="membership-cards" class="loader"></div>

                <dialog id="mydialog">
                    <div>
                        <h2>Title</h2>
                        <button>❌</button>
                    </div>
                    <div id="benefits-div"></div>
                </dialog>
            </section>

        </section>
    </main>
    <footer>
        <div class="social">
            <a href="https://www.facebook.com/ElTomiiXD/" target="_blank"><img src="images/facebook.svg" alt="Facebook Logo" width="16" height="16"></a>
            <a href="https://api.whatsapp.com/send/?phone=%2B541137663738&text&type=phone_number&app_absent=0" target="_blank"><img src="images/whatsapp.svg" alt="WhatsApp Logo" width="16" height="16"></a>
            <a href="https://www.instagram.com/tomii_gomez_/?__pwa=1" target="_blank"><img src="images/instagram.svg" alt="Instagram Logo" width="16" height="16"></a>
        </div>
        <span id="currentyear"></span>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
